configs:
  smnrp:
    file: ./smnrp.yml
volumes:
  smnrp_data:
services:
  ws:
    image: ethnexus/smnrpx:1.0.5
    volumes:
      - smnrp_data:/etc/letsencrypt
    configs:
      - source: smnrp
        target: /run/configs/smnrp.yml
    ports:
      - 80:80
      - 443:443
    env_file: .env
    restart: unless-stopped
    depends_on:
      - api
  api:
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_LOG_LEVEL=DEBUG
    ports:
      - "5042:5000"
  db:
    ports:
      - "54342:5432"
    volumes:
      - ./dumps:/dumps
